
<!DOCTYPE html>
<html ng-app="libraryApp">
<head>
<meta charset="UTF-8">
<title>AngularJS Online Library System</title>

<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-animate.js"></script>

<style>

body{
font-family:Arial;
background:#eef2f7;
padding:20px;
}

header{
background:#1976d2;
color:white;
padding:15px;
text-align:center;
border-radius:6px;
}

nav{
margin-top:15px;
}

nav a{
text-decoration:none;
background:#2196f3;
color:white;
padding:8px 12px;
margin-right:6px;
border-radius:4px;
}

nav a:hover{
background:#0d47a1;
}

.container{
background:white;
padding:20px;
margin-top:20px;
border-radius:6px;
box-shadow:0 3px 6px rgba(0,0,0,0.2);
}

input,select,textarea,button{
padding:7px;
margin:5px;
border-radius:4px;
border:1px solid #ccc;
}

button{
background:#2196f3;
color:white;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

.fade.ng-enter{
transition:0.5s;
opacity:0;
}

.fade.ng-enter-active{
opacity:1;
}

.dark{
background:#222;
color:white;
}

.dark .container{
background:#333;
}

</style>
</head>

<body ng-class="{'dark':darkMode}">

<header>
<h1>Online Library Management System</h1>
</header>

<nav>
<a href="#!/">Home</a>
<a href="#!/register">Register</a>
<a href="#!/login">Login</a>
<a href="#!/books">Books</a>
<a href="#!/add">Add Book</a>
<a href="#!/issue">Issue</a>
<a href="#!/membership">Membership</a>
<a href="#!/about">About</a>
</nav>

<div class="container fade" ng-view></div>

<script>

var app=angular.module("libraryApp",["ngRoute","ngAnimate"]);

/* ROUTING */

app.config(function($routeProvider){

$routeProvider

.when("/",{
template:`

<h2>Welcome to Digital Library</h2>

<button ng-click="darkMode=!darkMode">Toggle Dark Mode</button>

<p>Library Name: {{library}}</p>

<p>Enter Your Name:</p>
<input ng-model="name">

<p>Hello {{name}}</p>

<clock></clock>

`,
controller:"homeCtrl"
})

.when("/register",{
template:`

<h2>User Registration</h2>

<form ng-submit="registerUser()">

<input ng-model="user.name" placeholder="Full Name" required>
<br>

<input type="email" ng-model="user.email" placeholder="Email" required>
<br>

<input ng-model="user.username" placeholder="Username" required>
<br>

<input type="password" ng-model="user.password" placeholder="Password" required>
<br>

<button type="submit">Register</button>

</form>

<p style="color:green">{{msg}}</p>

`,
controller:"registerCtrl"
})

.when("/login",{
template:`

<h2>User Login</h2>

<form ng-submit="login()">

<input ng-model="user.username" placeholder="Username">
<br>

<input type="password" ng-model="user.password" placeholder="Password">
<br>

<button type="submit">Login</button>

</form>

<p style="color:red">{{message}}</p>

`,
controller:"loginCtrl"
})

.when("/books",{
template:`

<h2>Library Books</h2>

Search: <input ng-model="searchBook">

<table>

<tr>
<th>Title</th>
<th>Author</th>
<th>Category</th>
<th>Price</th>
<th>Action</th>
</tr>

<tr ng-repeat="b in books | filter:searchBook">

<td>{{b.title | capitalize}}</td>
<td>{{b.author}}</td>
<td>{{b.category}}</td>
<td>{{b.price | currency}}</td>

<td>

<button ng-click="editBook(b)">Edit</button>
<button ng-click="deleteBook($index)">Delete</button>

</td>

</tr>

</table>

<h3 ng-if="edit">Edit Book</h3>

<form ng-if="edit">

<input ng-model="edit.title">
<input ng-model="edit.author">
<input ng-model="edit.category">
<input ng-model="edit.price">

<button ng-click="updateBook()">Update</button>

</form>

`,
controller:"bookCtrl"
})

.when("/add",{
template:`

<h2>Add New Book</h2>

<form ng-submit="addBook()">

<input ng-model="newBook.title" placeholder="Title">
<input ng-model="newBook.author" placeholder="Author">
<input ng-model="newBook.category" placeholder="Category">
<input type="number" ng-model="newBook.price" placeholder="Price">

<button type="submit">Add</button>

</form>

`,
controller:"addCtrl"
})

.when("/issue",{
template:`

<h2>Issue Book</h2>

<form ng-submit="issueBook()">

<input ng-model="issue.student" placeholder="Student Name">

<select ng-model="issue.book">
<option ng-repeat="b in books">{{b.title}}</option>
</select>

<input type="date" ng-model="issue.date">

<button type="submit">Issue</button>

</form>

<table>

<tr>
<th>Student</th>
<th>Book</th>
<th>Date</th>
</tr>

<tr ng-repeat="i in issued">

<td>{{i.student}}</td>
<td>{{i.book}}</td>
<td>{{i.date | date}}</td>

</tr>

</table>

`,
controller:"issueCtrl"
})

.when("/membership",{
template:`

<h2>Library Membership Form</h2>

<form ng-submit="submitForm()">

<input ng-model="member.name" placeholder="Name">

<input ng-model="member.email" placeholder="Email">

<select ng-model="member.course">

<option>Computer</option>
<option>Mechanical</option>
<option>Civil</option>

</select>

<br>

Gender

<input type="radio" ng-model="member.gender" value="Male">Male
<input type="radio" ng-model="member.gender" value="Female">Female

<br>

<textarea ng-model="member.address" placeholder="Address"></textarea>

<br>

<button type="submit">Submit</button>

</form>

<h3>Preview</h3>

<pre>{{member | json}}</pre>

`,
controller:"formCtrl"
})

.when("/about",{
template:`

<h2>Scope Inheritance Example</h2>

<div ng-controller="parentCtrl">

<p>Parent Message: {{message}}</p>

<div ng-controller="childCtrl">

<p>Child Message: {{message}}</p>

</div>

</div>

`
})

.otherwise({redirectTo:"/"});

});

/* CONTROLLERS */

app.controller("homeCtrl",function($scope){
$scope.library="Atmiya University Digital Library";
});

app.controller("registerCtrl",function($scope){

$scope.registerUser=function(){

localStorage.setItem("user",JSON.stringify($scope.user));

$scope.msg="Registration Successful. Now Login.";

$scope.user={};

};

});

app.controller("loginCtrl",function($scope){

$scope.login=function(){

var storedUser=JSON.parse(localStorage.getItem("user"));

if(storedUser && 
$scope.user.username==storedUser.username && 
$scope.user.password==storedUser.password){

$scope.message="Login Successful";

}else{

$scope.message="Invalid Credentials";

}

};

});

app.controller("bookCtrl",function($scope){

var savedBooks=localStorage.getItem("books");

if(savedBooks){
$scope.books=JSON.parse(savedBooks);
}else{
$scope.books=[
{title:"Angular Basics",author:"John",category:"Programming",price:500},
{title:"Science World",author:"Alice",category:"Science",price:300},
{title:"Indian History",author:"Raman",category:"History",price:400}
];
}

$scope.deleteBook=function(index){

$scope.books.splice(index,1);

localStorage.setItem("books",JSON.stringify($scope.books));

};

$scope.editBook=function(book){

$scope.edit=angular.copy(book);

};

$scope.updateBook=function(){

for(var i=0;i<$scope.books.length;i++){

if($scope.books[i].title==$scope.edit.title){

$scope.books[i]=$scope.edit;

}

}

localStorage.setItem("books",JSON.stringify($scope.books));

$scope.edit=null;

};

});

app.controller("addCtrl",function($scope){

$scope.newBook={};

$scope.addBook=function(){

var books=JSON.parse(localStorage.getItem("books")) || [];

books.push($scope.newBook);

localStorage.setItem("books",JSON.stringify(books));

$scope.newBook={};

alert("Book Added");

};

});

app.controller("issueCtrl",function($scope){

$scope.books=[
{title:"Angular Basics"},
{title:"Science World"},
{title:"Indian History"}
];

$scope.issued=[];

$scope.issueBook=function(){

$scope.issued.push({

student:$scope.issue.student,
book:$scope.issue.book,
date:$scope.issue.date

});

$scope.issue={};

};

});

app.controller("formCtrl",function($scope){

$scope.member={};

$scope.submitForm=function(){

alert("Membership Submitted Successfully");

};

});

app.controller("parentCtrl",function($scope){
$scope.message="Message from Parent Controller";
});

app.controller("childCtrl",function($scope){
$scope.message="Child Controller Overrides Parent";
});

/* FILTER */

app.filter("capitalize",function(){

return function(input){

if(!input) return "";

return input.charAt(0).toUpperCase()+input.slice(1);

};

});

/* DIRECTIVE */

app.directive("clock",function(){

return{

template:"<p>Current Time: {{time | date:'mediumTime'}}</p>",

controller:function($scope){

$scope.time=new Date();

}

};

});

</script>

</body>
</html>
